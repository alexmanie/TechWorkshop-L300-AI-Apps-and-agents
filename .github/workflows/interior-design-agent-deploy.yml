name: Interior Design Agent workflow
on:
  push:
    paths:
      - "src/app/agents/interiorDesignAgent_initializer.py"
      - "src/prompts/InteriorDesignAgentPrompt.txt"
      - "src/app/tools/imageCreationTool.py"
      - "src/app/tools/aiSearchTools.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-interior-design-agent-initializer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: 'echo "$ENV" > src/.env'
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run interior design agent initializer
        run: |
          cd src/
          python app/agents/interiorDesignAgent_initializer.py
