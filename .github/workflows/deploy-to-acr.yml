name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: chat-app

jobs:
  build-and-push:
    name: Build & Push Docker Image to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Write the ENV secret to a .env file inside the src/ build context.
      # This file is NEVER committed to the repo; it only exists on the runner
      # during this workflow run. The src/.gitignore already excludes .env.
      - name: Create .env file from secret
        run: echo "${{ secrets.ENV }}" > src/.env

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Use src/ as both the build context and the Dockerfile location
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max